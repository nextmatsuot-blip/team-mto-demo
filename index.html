// ===== Toast =====
function showToast(msg, type='success') {
  const el=document.createElement('div')
  const bg=type==='error'?'#ef4444':type==='info'?'#3b82f6':'#1a1a1a'
  el.className='toast-anim'
  el.style.cssText=`background:${bg};color:#fff;font-size:13px;padding:10px 16px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);pointer-events:none;white-space:nowrap;font-family:inherit;`
  el.textContent=msg
  document.getElementById('toast-container').appendChild(el)
  setTimeout(()=>el.remove(), 2600)
}

// ===== Tab =====
function setTab(t) {
  currentTab=t
  const activeStyle='padding:6px 16px;border-radius:7px;font-size:13px;font-weight:500;background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1);border:none;cursor:pointer;position:relative;transition:all .1s;'
  const inactStyle='padding:6px 16px;border-radius:7px;font-size:13px;font-weight:500;background:transparent;color:#888;border:none;cursor:pointer;position:relative;transition:all .1s;'
  document.getElementById('tab-tasks').style.cssText=t==='tasks'?activeStyle:inactStyle
  document.getElementById('tab-cases').style.cssText=t==='cases'?activeStyle:inactStyle
  render()
}

// ===== ルーティーン =====
function applicable(r) {
  if(r.schedule==='daily')       return true
  if(r.schedule==='weekday')     return IS_WEEKDAY
  if(r.schedule==='monday')      return IS_MONDAY
  if(r.schedule==='month_start') return IS_MONTH_START
  if(r.schedule==='month_end')   return IS_MONTH_END
  if(r.schedule==='specific')    return (r.specific_days||'').split(',').map(s=>+s.trim()).includes(DATE)
  return false
}
function startEditRoutines(p) {
  selSnapshot[p]=routines.filter(r=>r.assignee===p).map(r=>({id:r.id,sel:r.sel}))
  editingRoutines[p]=true; render()
}
function cancelEditRoutines(p) {
  if(selSnapshot[p]) selSnapshot[p].forEach(s=>{ const r=routines.find(x=>x.id===s.id); if(r) r.sel=s.sel })
  editingRoutines[p]=false; render()
}
function confirmRoutines(p) {
  const cnt=routines.filter(r=>r.assignee===p&&r.sel).length
  if(cnt===0){showToast('少なくとも1件選択してください','error'); return}
  setupDone[p]=true; editingRoutines[p]=false; render(); saveState()
  showToast(`✓ ${cnt}件のルーティーンを追加しました`)
}
function skipRoutines(p) { setupDone[p]=true; editingRoutines[p]=false; render(); saveState() }
function toggleSel(id)   { const r=routines.find(x=>x.id===id); if(r){r.sel=!r.sel;render()} }
function selectAll(p)    { routines.filter(r=>r.assignee===p).forEach(r=>r.sel=true);  render() }
function selectNone(p)   { routines.filter(r=>r.assignee===p).forEach(r=>r.sel=false); render() }
function selectToday(p)  { routines.filter(r=>r.assignee===p).forEach(r=>r.sel=applicable(r)); render() }

// ===== タスク操作 =====
function toggleDone(id) {
  const t=tasks.find(x=>x.id===id); if(!t) return
  t.done=!t.done; render(); saveState()
  showToast(t.done?`✓ 完了：${t.title.slice(0,20)}…`:'↩ 未完了に戻しました')
}
function toggleRDone(id) {
  const r=routines.find(x=>x.id===id); if(!r) return
  r.done=!r.done; render(); saveState()
  if(r.done) showToast(`✓ 完了：${r.title.slice(0,20)}…`)
}
function changeType(id, type) {
  const t=tasks.find(x=>x.id===id)
  if(t){t.type=type; render(); saveState(); showToast(`→ ${TYPE_CFG[type].label}に移動しました`)}
}
function askDelete(id) {
  const t=tasks.find(x=>x.id===id); if(!t) return
  deleteTargetId=id
  document.getElementById('delete-target-name').textContent=t.title
  const d=document.getElementById('delete-dialog'); d.style.display='flex'
}
function confirmDelete() {
  if(!deleteTargetId) return
  const t=tasks.find(x=>x.id===deleteTargetId)
  tasks=tasks.filter(x=>x.id!==deleteTargetId); deleteTargetId=null
  document.getElementById('delete-dialog').style.display='none'
  render(); saveState(); showToast(`🗑 削除しました：${t?.title.slice(0,20)||''}…`)
}
function cancelDelete() {
  deleteTargetId=null; document.getElementById('delete-dialog').style.display='none'
}
function quickAdd() {
  const inp=document.getElementById('inbox-input'), title=inp.value.trim(); if(!title) return
  tasks.push({id:nextId++, assignee:inboxPerson, type:'inbox', title, done:false, comments:[]})
  inp.value=''; render(); saveState()
  showToast(`📦 ${inboxPerson}のぶち込み部屋に追加しました`)
  setTimeout(()=>document.getElementById(`sec-${inboxPerson}-inbox`)?.scrollIntoView({behavior:'smooth',block:'nearest'}),50)
}
function saveNewTask(person, type) {
  const key=`${person}-${type}`, inp=document.getElementById(`inp-${key}`)
  const title=inp?.value.trim(); if(!title) return
  tasks.push({id:nextId++, assignee:person, type, title, done:false, comments:[]})
  addingType=null; render(); saveState(); showToast('✓ タスクを追加しました')
}

// ===== モーダル =====
function openTask(id) {
  openId=id
  const t=tasks.find(x=>x.id===id)||routines.find(x=>x.id===id); if(!t) return
  modalCommentPerson=t.assignee
  const typeCfg=TYPE_CFG[t.type], schedCfg=SCHED_CFG[t.schedule]
  document.getElementById('modal-title-view').textContent=t.title
  document.getElementById('modal-title-edit').value=t.title
  document.getElementById('modal-title-edit').style.display='none'
  document.getElementById('modal-title-view').style.display='block'
  document.getElementById('modal-meta').textContent=`担当: ${t.assignee}`
  document.getElementById('modal-badge').innerHTML=schedCfg
    ?`<span style="padding:2px 8px;border-radius:4px;font-size:11px;" class="${schedCfg.cls}">${schedCfg.icon} ${schedCfg.label} ルーティーン</span>`
    :typeCfg?`<span style="font-size:11px;font-weight:600;color:${typeCfg.color};">● ${typeCfg.label}</span>`:''
  if(t.type&&!t.schedule){
    document.getElementById('modal-type-row').innerHTML=Object.entries(TYPE_CFG).map(([k,v])=>
      `<button onclick="changeType(${t.id},'${k}')"
        style="padding:4px 10px;font-size:11px;border-radius:20px;border:1.5px solid ${t.type===k?v.dot:'#e8e7e1'};background:${t.type===k?v.bg:'transparent'};color:${t.type===k?v.color:'#aaa'};cursor:pointer;font-weight:${t.type===k?600:400};font-family:inherit;">${v.label}</button>`
    ).join('')
  } else document.getElementById('modal-type-row').innerHTML=''
  renderThread(t)
  document.getElementById('modal').style.display='flex'
  setTimeout(()=>document.getElementById('modal-input').focus(),30)
}
function startEditTitle() {
  const view=document.getElementById('modal-title-view'), edit=document.getElementById('modal-title-edit')
  edit.value=view.textContent; view.style.display='none'; edit.style.display='block'; edit.focus(); edit.select()
}
function saveEditTitle() {
  const edit=document.getElementById('modal-title-edit'), newTitle=edit.value.trim()
  if(newTitle&&openId){
    const t=tasks.find(x=>x.id===openId)||routines.find(x=>x.id===openId)
    if(t){t.title=newTitle; render()}
    document.getElementById('modal-title-view').textContent=newTitle
    showToast('✓ タスク名を更新しました')
  }
  edit.style.display='none'; document.getElementById('modal-title-view').style.display='block'
}
function cancelEditTitle() {
  document.getElementById('modal-title-edit').style.display='none'
  document.getElementById('modal-title-view').style.display='block'
}
function renderThread(t) {
  const c=t.comments||[]
  const el=document.getElementById('modal-thread')
  el.innerHTML=c.length===0
    ?'<p style="font-size:12px;color:#ccc;text-align:center;padding:24px 0;">コメントはまだありません</p>'
    :c.map(cm=>`
      <div style="display:flex;gap:10px;">
        <div style="width:28px;height:28px;border-radius:50%;background:#f0efe9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#888;flex-shrink:0;">${cm.author[0]}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:baseline;gap:8px;">
            <span style="font-size:12px;font-weight:600;color:#333;">${cm.author}</span>
            <span style="font-size:11px;color:#ccc;">${cm.ts}</span>
          </div>
          <div style="font-size:13px;color:#444;margin-top:2px;line-height:1.5;">${cm.text}</div>
        </div>
      </div>`).join('')
}
function addComment() {
  const inp=document.getElementById('modal-input'), text=inp.value.trim()
  if(!text||!openId) return
  const t=tasks.find(x=>x.id===openId)||routines.find(x=>x.id===openId); if(!t) return
  ;(t.comments=t.comments||[]).push({author:modalCommentPerson,text,ts:'今'})
  inp.value=''; renderThread(t); saveState()
}
function closeModal() { document.getElementById('modal').style.display='none'; openId=null }
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('delete-dialog').style.display==='flex'){ cancelDelete(); return }
    if(document.getElementById('modal').style.display==='flex'){ closeModal(); return }
  }
})

          <button onclick="selectAll('${person}')"   style="padding:5px 10px;font-size:11px;color:#666;background:#fff;border:1px solid #e8e7e1;border-radius:7px;cursor:pointer;font-family:inherit;">全選択</button>

// ===== タスクカード =====

  return `
    <div class="task-card fade-in" style="background:#fff;border:1px solid #ebebeb;border-left:3px solid ${t.done?'#e5e5e5':typeColor};border-radius:10px;padding:10px 12px;${t.done?'opacity:.42;':''}">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <button class="check-btn" onclick="${isRoutine?`toggleRDone(${t.id})`:`toggleDone(${t.id})`}"
          style="margin-top:1px;width:18px;height:18px;border-radius:5px;border:1.5px solid ${t.done?'#22c55e':'#d4d4d0'};background:${t.done?'#22c55e':'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          ${t.done?'<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
        </button>

          <div style="margin-top:5px;">
            ${cnt>0
              ?`<button onclick="openTask(${t.id})" style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;"
                  onmouseenter="this.style.color='#4f8ef7'" onmouseleave="this.style.color='#aaa'">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                  ${cnt}
                </button>`
              :`<button onclick="openTask(${t.id})" style="font-size:11px;color:#ddd;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;opacity:0;" class="comment-hint"
                  onmouseenter="this.style.color='#4f8ef7'" onmouseleave="this.style.color='#ddd'">+ コメント</button>`}
          </div>
        </div>
        ${!isRoutine?`
        <div class="action-btns" style="display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .1s;flex-shrink:0;">
          <select style="border:none;background:transparent;font-size:11px;color:#bbb;cursor:pointer;max-width:66px;outline:none;"
            onchange="changeType(${t.id},this.value)">
            ${Object.entries(TYPE_CFG).map(([k,v])=>`<option value="${k}" ${t.type===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
          <button onclick="askDelete(${t.id})"
            style="width:24px;height:24px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#ccc;font-size:13px;"
            onmouseenter="this.style.background='#fef2f2';this.style.color='#ef4444'" onmouseleave="this.style.background='transparent';this.style.color='#ccc'">×</button>

      </div>

// ===== タスクセクション =====
function section(person, type) {
  const cfg=TYPE_CFG[type]
  const myR=type==='today'?routines.filter(r=>r.assignee===person&&r.sel):[]
  const myT=tasks.filter(t=>t.assignee===person&&t.type===type)
  const all=[...myR.map(r=>({...r,_r:true})),...myT]
  const active=all.filter(x=>!x.done), done=all.filter(x=>x.done)
  const key=`${person}-${type}`, isAdding=addingType===key
  const emptyMsg={
    today:'ルーティーン選択または「+ 追加」から',
    inprogress:'進行中のタスクはありません',
    waiting:'確認待ちのタスクはありません',
    inbox:'下のバーからいつでも追加できます',
  }
  return `
    <div id="sec-${key}" style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;padding:0 2px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="width:6px;height:6px;border-radius:50%;background:${cfg.dot};display:inline-block;"></span>
          <span style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#888;">${cfg.label}</span>
          <span style="font-size:11px;color:#bbb;">${active.length}</span>
          ${done.length?`<span style="font-size:11px;color:#86efac;">✓ ${done.length}</span>`:''}
        </div>
        <button onclick="addingType='${key}';render()"
          style="font-size:11px;color:#bbb;background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:5px;font-family:inherit;"
          onmouseenter="this.style.color='#4f8ef7';this.style.background='#f0f5ff'" onmouseleave="this.style.color='#bbb';this.style.background='none'">+ 追加</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        ${active.map(t=>taskCard(t,!!t._r)).join('')}
        ${isAdding?`
          <div style="background:#fff;border:1.5px solid #4f8ef7;border-radius:10px;padding:10px;" class="fade-in">
            <div style="display:flex;gap:6px;">
              <input id="inp-${key}" autofocus placeholder="タスク名 (Enter で保存 / Esc でキャンセル)"
                style="flex:1;border:none;outline:none;font-size:13px;color:#1a1a1a;font-family:inherit;"
                onkeydown="if(event.key==='Enter')saveNewTask('${person}','${type}');if(event.key==='Escape'){addingType=null;render()}">
              <button onclick="saveNewTask('${person}','${type}')" style="padding:5px 12px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;">保存</button>
              <button onclick="addingType=null;render()" style="padding:5px 8px;background:none;border:none;color:#bbb;font-size:16px;cursor:pointer;">×</button>
            </div>
          </div>`:''}
        ${active.length===0&&!isAdding?`
          <div style="border:1.5px dashed #e8e7e1;border-radius:10px;padding:12px 16px;">
            <p style="font-size:11px;color:#ccc;text-align:center;margin:0;">${emptyMsg[type]}</p>
          </div>`:''}
        ${done.length?`
          <details style="margin-top:2px;">
            <summary style="font-size:11px;color:#ccc;cursor:pointer;padding:3px 4px;list-style:none;user-select:none;"
              onmouseenter="this.style.color='#888'" onmouseleave="this.style.color='#ccc'">
              ▸ 完了済み（${done.length}件）
            </summary>
            <div style="margin-top:5px;display:flex;flex-direction:column;gap:5px;">${done.map(t=>taskCard(t,!!t._r)).join('')}</div>
          </details>`:''}
      </div>
    </div>`
}

// ===== 担当者パネル =====
function personPanel(person) {

  const done=setupDone[person], editing=editingRoutines[person]
  const activeCnt=tasks.filter(t=>t.assignee===person&&!t.done).length
  const rSel=routines.filter(r=>r.assignee===person&&r.sel).length
  const accent=ACCENT[person]

  return `
    <div style="background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e8e7e1;min-width:0;box-shadow:0 2px 16px rgba(0,0,0,.05);border-top:3px solid ${accent};">
      <!-- パネルヘッダー -->
      <div style="padding:12px 14px;border-bottom:1px solid #f0efe9;display:flex;align-items:center;justify-content:space-between;background:#fafaf9;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:30px;height:30px;border-radius:9px;background:${accent};display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;">${person[0]}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:#1a1a1a;">${person}</div>
            <div style="font-size:11px;color:#aaa;margin-top:1px;">
              ${done
                ?(activeCnt?`未完了 ${activeCnt}件`:'すべて完了 🎉')+(rSel?` · ルーティーン ${rSel}件`:'')
                :'ルーティーン未設定'}
            </div>
          </div>
        </div>
        ${done&&!editing?`
          <button onclick="startEditRoutines('${person}')"
            style="font-size:11px;color:#aaa;background:#fff;border:1px solid #e8e7e1;border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;white-space:nowrap;"
            onmouseenter="this.style.borderColor='${accent}';this.style.color='${accent}'" onmouseleave="this.style.borderColor='#e8e7e1';this.style.color='#aaa'">

          </button>`:''}
      </div>

      </div>
    </div>`
}

// ===== 案件レンダリング =====
function renderCases() {
  const alerts=CASES.filter(c=>c.alert&&!['完了','失注'].includes(c.status))
  const announces=CASES.filter(c=>c.announce&&!['完了','失注'].includes(c.status))
  const counts={}; CASES.forEach(c=>{counts[c.status]=(counts[c.status]||0)+1})

  const rows=CASES.map(c=>{
    const sc=S_CFG[c.status]||{c:'#666',bg:'#eee'}
    const stale=c.days>=21&&!['完了','失注'].includes(c.status)?'🚨':c.days>=14&&!['完了','失注'].includes(c.status)?'⚠️':''
    const rb=c.days>=21&&!['完了','失注'].includes(c.status)?'background:#fff8f8':c.days>=14&&!['完了','失注'].includes(c.status)?'background:#fffbeb':''
    const alertDot=c.alert?`<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#4f8ef7;margin-right:4px;vertical-align:middle;flex-shrink:0;"></span>`:''
    const label=c.status==='受注'?'受注 🎉':c.status==='完了'?'完了 ✓':c.status
    return `<tr style="border-bottom:1px solid #f5f5f3;${c.days>=21&&!['完了','失注'].includes(c.status)?'background:#fffafa':''}">
      <td style="padding:8px 6px 8px 12px;font-size:13px;width:24px;">${stale}</td>
      <td style="padding:8px 8px;">
        <div style="display:flex;align-items:flex-start;gap:5px;">
          ${alertDot}
          <a href="${c.slackUrl}" title="Slackで開く" style="color:#93c5fd;font-size:12px;flex-shrink:0;margin-top:1px;text-decoration:none;"
            onclick="if('${c.slackUrl}'==='#')event.preventDefault()">↗</a>
          <span style="font-size:13px;color:#1a1a1a;line-height:1.4;">${c.name}</span>
        </div>
      </td>
      <td style="padding:8px;font-size:11px;color:#aaa;white-space:nowrap;" class="hidden sm:table-cell">${c.assignee}</td>
      <td style="padding:8px;"><span style="padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap;color:${sc.c};background:${sc.bg};">${label}</span></td>
      <td style="padding:8px 12px 8px 0;font-size:11px;color:#bbb;white-space:nowrap;text-align:right;">${c.days===0?'今日':`${c.days}日前`}</td>
    </tr>`
  }).join('')

  const summary=Object.entries(counts).map(([s,n])=>{
    const sc=S_CFG[s]||{c:'#666',bg:'#eee'}; const l=s==='受注'?'受注 🎉':s==='完了'?'完了 ✓':s
    return `<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;color:${sc.c};background:${sc.bg};">${l} ${n}</span>`
  }).join('')

  return `
    ${alerts.length>0?`
      <div style="background:#fff;border:1px solid #e8e7e1;border-radius:12px;overflow:hidden;margin-bottom:12px;">
        <div style="padding:10px 16px;border-bottom:1px solid #f0efe9;display:flex;align-items:center;gap:8px;">
          <span class="pulse-anim" style="color:#ef4444;font-size:14px;">●</span>
          <span style="font-size:12px;font-weight:600;color:#1a1a1a;">あなたへの通知</span>
          <span style="font-size:11px;color:#aaa;">${alerts.length}件</span>
        </div>
        <div>
          ${alerts.slice(0,5).map(c=>`
            <div style="padding:10px 16px;border-bottom:1px solid #f5f5f3;display:flex;align-items:flex-start;gap:10px;">
              <span style="font-size:13px;flex-shrink:0;margin-top:1px;">${c.days>=21?'🚨':c.days>=14?'⚠️':'📌'}</span>
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.name}</div>
                <div style="font-size:11px;color:#aaa;margin-top:2px;">${c.assignee} · ${c.status} · ${c.days}日前</div>
              </div>
              <a href="${c.slackUrl}" style="font-size:11px;color:#4f8ef7;border:1px solid #dbeafe;padding:4px 10px;border-radius:7px;white-space:nowrap;background:#fff;text-decoration:none;"
                onclick="if('${c.slackUrl}'==='#')event.preventDefault()">Slackで開く</a>
            </div>`).join('')}
          ${alerts.length>5?`<div style="padding:8px;text-align:center;font-size:11px;color:#aaa;">他 ${alerts.length-5}件</div>`:''}
        </div>
      </div>`:''}

    ${announces.length>0?`
      <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;overflow:hidden;margin-bottom:12px;">
        <div style="padding:10px 16px;border-bottom:1px solid #fef3c7;display:flex;align-items:center;gap:6px;">
          <span style="font-size:13px;">📢</span>
          <span style="font-size:12px;font-weight:600;color:#92400e;">要アナウンス</span>
          <span style="font-size:11px;color:#b45309;">${announces.length}件</span>
        </div>
        ${announces.map(c=>`
          <div style="padding:8px 16px;border-bottom:1px solid #fef3c7;">
            <div style="font-size:12px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.name}</div>
            <div style="font-size:11px;color:#b45309;margin-top:2px;">${c.announce}</div>
          </div>`).join('')}
      </div>`:''}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:#bbb;">
        <span>🔄 Slack自動連携中</span>
        <span>最終更新: ${fmtTime(lastUpdated)}</span>
      </div>
      <button onclick="simulateSlackRefresh()"
        style="font-size:11px;color:#4f8ef7;background:#fff;border:1px solid #dbeafe;border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;">
        ↺ 今すぐ更新
      </button>
    </div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">${summary}</div>

    <div style="background:#fff;border:1px solid #e8e7e1;border-radius:12px;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#fafaf9;border-bottom:1px solid #f0efe9;">
            <th style="width:24px;"></th>
            <th style="text-align:left;padding:8px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#bbb;">案件名</th>
            <th style="text-align:left;padding:8px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#bbb;width:110px;" class="hidden sm:table-cell">担当</th>
            <th style="text-align:left;padding:8px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#bbb;width:120px;">ステータス</th>
            <th style="text-align:right;padding:8px 12px 8px 0;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#bbb;width:60px;">更新</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="font-size:11px;color:#ccc;text-align:center;margin-top:10px;">↗ アイコンをタップするとSlackのスレッドを開きます（本番では自動設定）</p>`
}

// ===== メインレンダー =====
function render() {
  document.getElementById('today-label').textContent=`${D.getMonth()+1}月${D.getDate()}日（${DAYS_JP[DOW]}）`
  if(currentTab==='cases'){ document.getElementById('content').innerHTML=renderCases(); return }
  document.getElementById('content').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;">
      ${personPanel('MTO')}
      ${personPanel('れんた')}
    </div>`
  // task-cardホバー用にCSS注入
  document.querySelectorAll('.task-card').forEach(card=>{
    card.addEventListener('mouseenter',()=>{ card.querySelector('.action-btns')&&(card.querySelector('.action-btns').style.opacity='1'); card.querySelector('.comment-hint')&&(card.querySelector('.comment-hint').style.opacity='1') })
    card.addEventListener('mouseleave',()=>{ card.querySelector('.action-btns')&&(card.querySelector('.action-btns').style.opacity='0'); card.querySelector('.comment-hint')&&(card.querySelector('.comment-hint').style.opacity='0') })
  })
  const af=document.querySelector('[autofocus]')
  if(af) setTimeout(()=>af.focus(),30)
}

// ===== タブ間リアルタイム同期 (localStorage) =====
const LS_KEY = 'tmto_state'
const LS_TS  = 'tmto_ts'

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({tasks, routines, setupDone}))
    localStorage.setItem(LS_TS, Date.now().toString())
  } catch(e) {}
}
function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY)
    if(!s) return
    const d = JSON.parse(s)
    if(d.tasks)    tasks    = d.tasks
    if(d.routines) routines = d.routines
    if(d.setupDone) setupDone = d.setupDone
  } catch(e) {}
}
// 別タブの変更を即時受信
window.addEventListener('storage', e => {
  if(e.key === LS_TS) {
    loadState(); render()
    showToast('🔄 他のウィンドウから更新されました', 'info')
  }
})
// 起動時に既存データを読み込む
loadState()

updateNotifBadge()
render()
</script>
