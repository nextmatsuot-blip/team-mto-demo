<title>TEAM MTO</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f0efe9;
    color: #1a1a1a;
  }
  main {
    width: min(420px, 100%);
    background: #fff;
    border: 1px solid #deddd7;
    border-radius: 8px;
    padding: 24px;
    box-shadow: 0 8px 28px rgba(20, 20, 20, .08);
  }
  .mark {
    width: 36px;
    height: 36px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    background: linear-gradient(135deg, #4f8ef7, #7c5fe6);
    color: #fff;
    font-weight: 700;
    margin-bottom: 16px;
    font-size: 15px;
  }
  h1 { margin: 0 0 8px; font-size: 20px; line-height: 1.35; }
  p { margin: 0 0 18px; color: #60605b; line-height: 1.65; }
  label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: #3a3a36; }
  input {
    width: 100%;
    height: 44px;
    border: 1px solid #cecdc7;
    border-radius: 8px;
    padding: 0 12px;
    font-size: 16px;
    outline: none;
  }
  input:focus { border-color: #5b6ee1; box-shadow: 0 0 0 3px rgba(91, 110, 225, .18); }
  button {
    width: 100%;
    height: 44px;
    margin-top: 14px;
    border: 0;
    border-radius: 8px;
    background: #111113;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  button:disabled { opacity: .62; cursor: wait; }
  .error { min-height: 20px; margin-top: 12px; color: #b42318; font-size: 13px; }
</style>
</head>

  const saltB64 = "Tz8qeXbjnpxglGEhYgSxYQ==";
  const ivB64 = "VUCyUi+WWPn6gH6X";
  const iterations = 250000;

  const form   = document.getElementById("gate");
  const input  = document.getElementById("password");
  const submit = document.getElementById("submit");
  const error  = document.getElementById("error");

  function bytesFromBase64(value) {
    const binary = atob(value);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password) {
    const baseKey = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: bytesFromBase64(saltB64), iterations, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function unlock(password) {
    const data = bytesFromBase64(encryptedPayload);
    const key  = await deriveKey(password);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: bytesFromBase64(ivB64) }, key, data);
    return new TextDecoder().decode(plain);
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    error.textContent = "";
    submit.disabled = true;
    submit.textContent = "確認中...";
    try {
      const html = await unlock(input.value);
      document.open();
      document.write(html);
      document.close();
    } catch {
      error.textContent = "パスワードが違います。";
      submit.disabled = false;
      submit.textContent = "開く";
      input.select();
    }
  });
})();
