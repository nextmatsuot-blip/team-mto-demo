<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>TEAM MTO</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #0c0c0e;
    color: #f0f0f0;
  }
  main {
    width: min(420px, 100%);
    background: #141416;
    border: 1px solid #282828;
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
  }
  .logo-wrap { margin-bottom: 18px; }
  h1 { margin: 0 0 6px; font-size: 20px; line-height: 1.35; color: #f0f0f0; }
  p { margin: 0 0 20px; color: #888; line-height: 1.65; font-size: 13px; }
  label.field-label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: #888; }
  input[type=password] {
    width: 100%;
    height: 44px;
    border: 1.5px solid #333;
    border-radius: 9px;
    padding: 0 12px;
    font-size: 16px;
    outline: none;
    background: #0c0c0e;
    color: #f0f0f0;
    transition: border-color .15s;
  }
  input[type=password]:focus { border-color: #c8f000; box-shadow: 0 0 0 3px rgba(200,240,0,.12); }
  .remember-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 12px; cursor: pointer; font-size: 12px; color: #888;
  }
  .remember-row input { width:15px; height:15px; accent-color:#c8f000; cursor:pointer; }
  button#submit {
    width: 100%;
    height: 44px;
    margin-top: 16px;
    border: 0;
    border-radius: 9px;
    background: #c8f000;
    color: #000;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  button#submit:disabled { opacity: .5; cursor: wait; }
  button#submit:hover:not(:disabled) { opacity: .88; }
  .error { min-height: 20px; margin-top: 12px; color: #f87171; font-size: 13px; }
  #auto-msg { text-align:center; font-size:12px; color:#888; margin-top:8px; }
</style>
</head>

<main>
  <div class="logo-wrap">

    <div style="font-size:28px;font-weight:800;color:#f0f0f0;letter-spacing:.04em;">MTO</div>
  </div>
  <h1>タスク管理</h1>
  <p>パスワードを入力してアクセスしてください。</p>

  <form id="gate">

    <input id="password" type="password" autocomplete="current-password" autofocus>
    <label class="remember-row">
      <input type="checkbox" id="remember">
      <span>このデバイスでパスワードを記憶する</span>
    </label>
    <button id="submit" type="submit">開く →</button>
    <div id="error" class="error" role="alert"></div>
  </form>
</main>

  const saltB64 = "qHnB/zF+xOqCcUR3dqVB2A==";
  const ivB64 = "uXQEfSylhVWwSzl2";
  const iterations = 250000;

  const form   = document.getElementById("gate");
  const input  = document.getElementById("password");
  const submit = document.getElementById("submit");
  const error  = document.getElementById("error");

  function bytesFromBase64(value) {
    const binary = atob(value);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password) {
    const baseKey = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: bytesFromBase64(saltB64), iterations, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function unlock(password) {
    const data = bytesFromBase64(encryptedPayload);
    const key  = await deriveKey(password);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: bytesFromBase64(ivB64) }, key, data);
    return new TextDecoder().decode(plain);
  }

  const PW_KEY = "tmto_saved_pw";

  async function tryUnlock(pw, remember) {
    const html = await unlock(pw);
    if (remember) localStorage.setItem(PW_KEY, pw);
    document.open();
    document.write(html);
    document.close();
  }

  const saved = localStorage.getItem(PW_KEY);
  if (saved) {
    document.getElementById("auto-msg").style.display = "block";
    document.getElementById("gate").style.display = "none";
    tryUnlock(saved, false).catch(() => {
      localStorage.removeItem(PW_KEY);
      document.getElementById("auto-msg").style.display = "none";
      document.getElementById("gate").style.display = "block";
    });
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    error.textContent = "";
    submit.disabled = true;
    submit.textContent = "確認中...";
    try {
      const remember = document.getElementById("remember").checked;
      await tryUnlock(input.value, remember);
    } catch {
      error.textContent = "パスワードが違います。";
      submit.disabled = false;
      submit.textContent = "開く →";
      input.select();
    }
  });
})();
